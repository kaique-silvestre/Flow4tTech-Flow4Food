name: Smoke Test â€” Staging

# Roda apÃ³s push em staging (ou seja, apÃ³s merge de PR developmentâ†’staging).
# Aguarda o Railway terminar o deploy e confirma que o backend estÃ¡ respondendo.
on:
  push:
    branches: [staging]

jobs:
  smoke-test:
    name: Backend staging â€” health check
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Railway deploy and check /health
        env:
          STAGING_URL: https://flow4tech-flow4food-staging.up.railway.app
        run: |
          echo "Aguardando Railway deploy ficar pronto..."
          MAX_ATTEMPTS=10
          INTERVAL=30
          attempt=1

          until [ $attempt -gt $MAX_ATTEMPTS ]; do
            echo "Tentativa $attempt/$MAX_ATTEMPTS â€” GET $STAGING_URL/health"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$STAGING_URL/health" || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "âœ“ Staging respondeu 200. Deploy OK."
              exit 0
            fi

            echo "  Status: $STATUS â€” aguardando ${INTERVAL}s..."
            sleep $INTERVAL
            attempt=$((attempt + 1))
          done

          echo "âœ— Staging nÃ£o respondeu apÃ³s $((MAX_ATTEMPTS * INTERVAL))s."
          echo "  Verificar logs no Railway dashboard."
          exit 1
