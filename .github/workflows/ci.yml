name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging]

jobs:
  # ──────────────────────────────────────────
  # BACKEND
  # ──────────────────────────────────────────
  backend:
    name: Backend — lint, types, migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: matchpoint
          POSTGRES_PASSWORD: matchpoint
          POSTGRES_DB: matchpoint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://matchpoint:matchpoint@localhost:5432/matchpoint_test
      JWT_SECRET: ci-test-secret-replace-in-real-environments-only
      ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/

      - name: Check migration heads (must be exactly 1)
        run: alembic heads | wc -l | grep -q "^1$" || (echo "ERROR: multiple alembic heads detected" && exit 1)

      - name: Run migrations on test DB
        run: alembic upgrade head

      - name: Verify migrations are up to date
        run: alembic check

      - name: Run tests
        run: pytest --tb=short -q
        # Remove this condition when tests are written:
        continue-on-error: true

  # ──────────────────────────────────────────
  # FRONTEND
  # ──────────────────────────────────────────
  frontend:
    name: Frontend — lint, types, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint — zero warnings)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Run tests
        run: npm test
        # Remove this condition when tests are written:
        continue-on-error: true
